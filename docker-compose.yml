version: '3.8'

networks:
  pr-analyzer:
    driver: bridge

services:
  # MariaDB
  db:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=pr_analyzer
      - MARIADB_USER=pr_analyzer
      - MARIADB_PASSWORD=pr_analyzer
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - pr-analyzer
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:3000"]
      - DATABASE_URL=mysql://pr_analyzer:pr_analyzer@db:3306/pr_analyzer
      - ROCKETRIDE_URI=ws://host.containers.internal:5565
    volumes:
      - ./backend:/app
      - ./pipeline:/app/pipeline
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - pr-analyzer
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
    command: node server.js
    restart: unless-stopped
    networks:
      - pr-analyzer
    depends_on:
      - backend

  # Local Qdrant (optional - use Qdrant Cloud in production)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    profiles:
      - local-qdrant

volumes:
  mariadb_data:
  qdrant_storage:

networks:
  pr-analyzer:
    driver: bridge
